// ── BACKGROUND MUSIC ──
let bgMusicOn=false;
let bgMusicNodes=[];

function startBgMusic(){
  if(bgMusicOn) return;
  bgMusicOn=true;
  resumeAC();
  playBgLoop();
}

function stopBgMusic(){
  bgMusicOn=false;
  bgMusicNodes.forEach(n=>{ try{n.stop();}catch(e){} });
  bgMusicNodes=[];
}

function playBgLoop(){
  if(!bgMusicOn) return;
  const t=AC.currentTime;
  const bpm=72; // calm tempo
  const beat=60/bpm;
  const bars=8;
  const loopDur=bars*4*beat;

  // ── Bass notes — slow moving, every 2 beats ──
  const bassSeq=[55,55,58,58,55,55,52,52, 55,55,58,58,60,60,58,58];
  bassSeq.forEach((freq,i)=>{
    const o=AC.createOscillator();
    const g=AC.createGain();
    o.connect(g); g.connect(masterGain);
    o.type='sine'; o.frequency.value=freq;
    const bt=t+i*beat*2;
    g.gain.setValueAtTime(0,bt);
    g.gain.linearRampToValueAtTime(0.07,bt+0.05);
    g.gain.setValueAtTime(0.07,bt+beat*1.6);
    g.gain.linearRampToValueAtTime(0,bt+beat*2);
    o.start(bt); o.stop(bt+beat*2+0.1);
    bgMusicNodes.push(o);
  });

  // ── Melody — gentle pentatonic notes ──
  const melSeq=[
    {f:220,d:1},{f:247,d:0.5},{f:262,d:0.5},{f:294,d:1},{f:0,d:1},
    {f:330,d:0.5},{f:294,d:0.5},{f:262,d:1},{f:247,d:1},{f:220,d:1},
    {f:0,d:1},{f:247,d:0.5},{f:262,d:0.5},{f:294,d:0.5},{f:330,d:0.5},{f:247,d:1},{f:220,d:2}
  ];
  let mt=t+beat*2; // melody starts after 2 beats
  melSeq.forEach(({f,d})=>{
    if(f>0){
      const o=AC.createOscillator();
      const g=AC.createGain();
      o.connect(g); g.connect(masterGain);
      o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(0,mt);
      g.gain.linearRampToValueAtTime(0.05,mt+0.04);
      g.gain.setValueAtTime(0.05,mt+d*beat*0.8);
      g.gain.linearRampToValueAtTime(0,mt+d*beat);
      o.start(mt); o.stop(mt+d*beat+0.05);
      bgMusicNodes.push(o);
    }
    mt+=d*beat;
  });

  // ── Hi-hat — subtle tick every beat ──
  for(let b=0;b<bars*4;b++){
    const buf=AC.createBuffer(1,AC.sampleRate*0.04,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=AC.createBufferSource();
    const flt=AC.createBiquadFilter();
    const g=AC.createGain();
    src.buffer=buf; flt.type='highpass'; flt.frequency.value=8000;
    src.connect(flt); flt.connect(g); g.connect(masterGain);
    const vol=b%4===0?0.06:b%2===0?0.03:0.015; // accent on beat 1, lighter on others
    g.gain.setValueAtTime(vol,t+b*beat);
    src.start(t+b*beat);
    bgMusicNodes.push(src);
  }

  // ── Kick — every 4 beats ──
  for(let b=0;b<bars;b++){
    const o=AC.createOscillator();
    const g=AC.createGain();
    o.connect(g); g.connect(masterGain);
    o.type='sine';
    o.frequency.setValueAtTime(120,t+b*beat*4);
    o.frequency.exponentialRampToValueAtTime(40,t+b*beat*4+0.2);
    g.gain.setValueAtTime(0.12,t+b*beat*4);
    g.gain.exponentialRampToValueAtTime(0.001,t+b*beat*4+0.3);
    o.start(t+b*beat*4); o.stop(t+b*beat*4+0.35);
    bgMusicNodes.push(o);
  }

  setTimeout(()=>{ bgMusicNodes=[]; playBgLoop(); }, loopDur*1000-100);
}

// Menu canvas — floating card particles
(function initMenuCanvas(){
  const canvas=document.getElementById('menu-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const particles=[];
  
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);

  const symbols=['★','♠','♥','♦','♣','🕴️','💣','🔍','🛡️'];
  for(let i=0;i<30;i++){
    particles.push({
      x:Math.random()*window.innerWidth,
      y:Math.random()*window.innerHeight,
      vx:(Math.random()-.5)*0.4,
      vy:-(0.2+Math.random()*0.5),
      alpha:Math.random()*0.15+0.03,
      size:10+Math.random()*20,
      sym:symbols[Math.floor(Math.random()*symbols.length)],
      rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-.5)*0.02,
    });
  }

  window._drawMenu=function drawMenu(){
    if(document.getElementById('main-menu').classList.contains('hidden')) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV;
      if(p.y<-50){ p.y=canvas.height+50; p.x=Math.random()*canvas.width; }
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha=p.alpha;
      ctx.font=`${p.size}px serif`;
      ctx.fillStyle='rgba(200,160,40,1)';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(p.sym,0,0);
      ctx.restore();
    });
    requestAnimationFrame(drawMenu);
  }
  window._drawMenu();
})();


// ── COIN SYSTEM ──
function getCoins(){ return parseInt(localStorage.getItem('hitman_coins')||'0'); }
function setCoins(n){ localStorage.setItem('hitman_coins',Math.max(0,n)); updateCoinDisplay(); }
function addCoins(n){ setCoins(getCoins()+n); }
function hasSkin(id){ return id==='classic'||localStorage.getItem('skin_'+id)==='1'; }
function buySkin(id){ localStorage.setItem('skin_'+id,'1'); }

function updateCoinDisplay(){
  const el=document.getElementById('coin-display');
  if(el) el.textContent='🪙 '+getCoins();
}


// ── CHALLENGE SYSTEM ──
let challenges = [];

function initChallenges(){
  challenges = [
    { id:'streak3', text:'נצח 3 פעמים רצוף', reward:3, progress:0, goal:3, done:false, icon:'🔥' },
    { id:'expose4', text:'נצח 4 פעמים עם קלף החשיפה', reward:4, progress:0, goal:4, done:false, icon:'🔦' },
    { id:'kill',    text:'חסל את הברון', reward:10, progress:0, goal:1, done:false, icon:'💀' },
  ];
  G._streak=0;
  G._exposeWins=0;
  renderChallenges();
}

function renderChallenges(){
  const el=document.getElementById('challenges-bar');
  if(!el) return;
  el.innerHTML='';
  challenges.forEach(c=>{
    const div=document.createElement('div');
    div.className='challenge-item'+(c.done?' done':'');
    div.innerHTML=`
      <span class="ch-icon">${c.icon}</span>
      <span class="ch-text">${c.text}</span>
      <span class="ch-prog">${c.done?'✓':c.progress+'/'+c.goal}</span>
      <span class="ch-reward">🪙${c.reward}</span>
    `;
    el.appendChild(div);
  });
}

function completeChallenge(id){
  const c=challenges.find(x=>x.id===id);
  if(!c||c.done) return;
  c.done=true;
  addCoins(c.reward);
  addLog(c.icon+' אתגר הושלם: '+c.text+' — 🪙+'+c.reward,'sys');
  showChallengeBanner(c);
  renderChallenges();
}

function showChallengeBanner(c){
  const b=document.createElement('div');
  b.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:180;'+
    'background:rgba(0,0,0,.9);border:2px solid #FFD700;border-radius:10px;'+
    'padding:12px 24px;text-align:center;direction:rtl;'+
    'font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:#FFD700;'+
    'box-shadow:0 0 30px rgba(255,215,0,.5);animation:ch-pop .4s cubic-bezier(.175,.885,.32,1.275);';
  b.innerHTML=c.icon+' אתגר הושלם!<br><span style="font-size:13px;color:rgba(255,255,255,.7)">'+c.text+'</span><br>🪙 +'+c.reward+' מטבעות';
  document.body.appendChild(b);
  setTimeout(()=>{ b.style.transition='opacity .5s'; b.style.opacity='0'; setTimeout(()=>b.remove(),500); }, 2500);
}

function onRoundWin(cardEffect){
  // streak
  G._streak=(G._streak||0)+1;
  challenges.find(x=>x.id==='streak3').progress=G._streak;
  if(G._streak>=3) completeChallenge('streak3');

  // expose wins
  if(cardEffect==='expose'){
    G._exposeWins=(G._exposeWins||0)+1;
    const ec=challenges.find(x=>x.id==='expose4');
    ec.progress=G._exposeWins;
    if(G._exposeWins>=4) completeChallenge('expose4');
  }

  renderChallenges();
}

function onRoundLose(){
  G._streak=0;
  challenges.find(x=>x.id==='streak3').progress=0;
  renderChallenges();
}

function onBaronKilled(){
  const c=challenges.find(x=>x.id==='kill');
  c.progress=1;
  completeChallenge('kill');
}


function openChallengesPanel(){
  renderChallengesPanel();
  document.getElementById('challenges-panel').classList.add('open');
}
function closeChallengesPanel(){
  document.getElementById('challenges-panel').classList.remove('open');
}
function renderChallengesPanel(){
  const list=document.getElementById('challenges-panel-list');
  if(!list) return;
  if(!challenges||!challenges.length){ list.innerHTML='<div style="color:rgba(255,255,255,.4);text-align:center;padding:20px;">התחל משחק כדי לראות אתגרים</div>'; return; }
  list.innerHTML='';
  challenges.forEach(c=>{
    const pct=Math.min(100,Math.round(c.progress/c.goal*100));
    const item=document.createElement('div');
    item.className='ch-panel-item'+(c.done?' done':'');
    item.innerHTML=`
      <div class="ch-panel-icon">${c.icon}</div>
      <div class="ch-panel-info">
        <div class="ch-panel-name">${c.text}</div>
        <div class="ch-panel-bar-wrap"><div class="ch-panel-bar" style="width:${pct}%"></div></div>
        <div class="ch-panel-status">${c.done?'✓ הושלם':c.progress+' / '+c.goal}</div>
      </div>
      <div class="ch-panel-reward">${c.done?'✓':'🪙'+c.reward}</div>
    `;
    list.appendChild(item);
  });
}


// ── PWA INSTALL ──
let deferredPrompt = null;

// Generate app icon as canvas data URL
function generateAppIcon(){
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  // Background
  const bg = ctx.createRadialGradient(256,256,0,256,256,300);
  bg.addColorStop(0,'#1a0a30'); bg.addColorStop(1,'#050208');
  ctx.fillStyle=bg; ctx.fillRect(0,0,512,512);
  // Border
  ctx.strokeStyle='rgba(200,160,40,0.8)'; ctx.lineWidth=16;
  ctx.strokeRect(20,20,472,472);
  // Emoji
  ctx.font='280px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🕵️',256,256);
  return c.toDataURL('image/png');
}

// Generate manifest blob
function generateManifest(iconUrl){
  const manifest = {
    name: 'מלחמת המתנקש',
    short_name: 'מתנקש',
    description: 'משחק קלפים טקטי',
    start_url: '.',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#050208',
    theme_color: '#050208',
    lang: 'he',
    dir: 'rtl',
    icons: [
      { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  return URL.createObjectURL(blob);
}

window.addEventListener('load', ()=>{
  const iconUrl = generateAppIcon();
  // Set apple touch icon
  document.getElementById('apple-icon').href = iconUrl;
  // Set manifest
  const manifestUrl = generateManifest(iconUrl);
  document.getElementById('pwa-manifest').href = manifestUrl;
});

// Capture install prompt
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  // Show install button in menu
  const btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'flex';
});

window.addEventListener('appinstalled', ()=>{
  deferredPrompt = null;
  const btn = document.getElementById('install-btn');
  if(btn) btn.style.display = 'none';
});

async function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
  } else {
    // Show instructions for iOS / unsupported
    showInstallInstructions();
  }
}

function showInstallInstructions(){
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const msg = isIOS
    ? 'להתקנה על iPhone:\nלחץ על כפתור השיתוף ⬆️\nואז "הוסף למסך הבית"'
    : 'להתקנה:\nפתח את תפריט הדפדפן ⋮\nואז "הוסף למסך הבית" או "התקן אפליקציה"';
  showConfirmDialog('התקנה כאפליקציה', msg, ()=>{}, ()=>{});
}


function setVolume(v){
  masterGain.gain.value = v;
  isMuted = (v === 0);
  localStorage.setItem('hitman_vol', v);
  const btn = document.getElementById('volume-btn');
  if(btn) btn.textContent = isMuted ? '🔇' : v > 0.5 ? '🔊' : '🔉';
  const slider = document.getElementById('vol-slider');
  if(slider) slider.value = v;
}

function toggleMute(){
  if(isMuted){
    const saved = parseFloat(localStorage.getItem('hitman_vol_pre')||'0.7');
    setVolume(saved > 0 ? saved : 0.7);
  } else {
    localStorage.setItem('hitman_vol_pre', masterGain.gain.value);
    setVolume(0);
  }
}

function updateVolumeBtn(){
  const btn = document.getElementById('volume-btn');
  if(btn){
    const v = masterGain.gain.value;
    btn.textContent = isMuted ? '🔇' : v > 0.5 ? '🔊' : '🔉';
  }
}

function openSoundPanel(){
  resumeAC();
  let p = document.getElementById('sound-panel');
  if(p){ p.style.display='flex'; const s=document.getElementById('vol-slider'); if(s) s.value=masterGain.gain.value; return; }
  p = document.createElement('div');
  p.id = 'sound-panel';
  p.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;';
  p.innerHTML = `
    <div style="width:100%;max-width:480px;background:#0d0b14;border-radius:20px 20px 0 0;border-top:2px solid rgba(255,255,255,.1);padding:24px 20px 40px;direction:rtl;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#fff;margin-bottom:20px;">🔊 הגדרות שמע</div>
      <div style="margin-bottom:20px;">
        <div style="font-family:'Heebo',sans-serif;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:10px;">עוצמת קול</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">🔇</span>
          <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="${masterGain.gain.value}"
            style="flex:1;cursor:pointer;accent-color:#F0C060;"
            oninput="setVolume(parseFloat(this.value))">
          <span style="font-size:18px;">🔊</span>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:16px;">
        <button onclick="setVolume(0)" style="flex:1;padding:10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;">🔇 השתקה</button>
        <button onclick="setVolume(0.4)" style="flex:1;padding:10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;">🔉 נמוך</button>
        <button onclick="setVolume(1)" style="flex:1;padding:10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;">🔊 מלא</button>
      </div>
      <button onclick="document.getElementById('sound-panel').style.display='none'" style="width:100%;padding:12px;border-radius:8px;background:rgba(200,160,40,.12);border:1px solid rgba(200,160,40,.3);color:#F0C060;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;">סגור</button>
    </div>`;
  p.onclick = e => { if(e.target===p) p.style.display='none'; };
  document.body.appendChild(p);
}

// Load saved volume
(function(){
  const saved = parseFloat(localStorage.getItem('hitman_vol'));
  if(!isNaN(saved)){ masterGain.gain.value=saved; isMuted=saved===0; }
})();

initGame();
