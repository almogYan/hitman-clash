<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מלחמת המתנקש</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
:root{
  --felt:#1a3a1a;--felt2:#1f4a1f;--felt3:#163016;
  --gold:#C8A040;--gold2:#F0C060;--gold3:#8A6820;
  --red:#CC2200;--red2:#FF3A1A;
  --card-bg:#E8DFC8;--card-shadow:rgba(0,0,0,0.55);
  --suit-r:#C41010;--suit-b:#1A1A2E;
}
html,body{width:100%;height:100%;overflow:hidden;}

#bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  width:100%;height:100%;
}
body{
  background:var(--felt3);
  font-family:'Heebo','Special Elite',cursive;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* felt texture */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(45deg,rgba(0,0,0,.04) 0,rgba(0,0,0,.04) 1px,transparent 0,transparent 50%),
    repeating-linear-gradient(-45deg,rgba(0,0,0,.04) 0,rgba(0,0,0,.04) 1px,transparent 0,transparent 50%);
  background-size:6px 6px;
}

/* gold border */
body::after{
  content:'';position:fixed;inset:6px;border-radius:14px;
  border:2px solid rgba(200,160,64,0.18);pointer-events:none;z-index:0;
}

#app{
  direction:rtl;text-align:right;
  position:relative;z-index:1;
  width:500px;max-width:100%;
  height:100dvh;
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:8px 10px;gap:6px;
  flex-shrink:1;
  min-width:0;
}

/* ── HEADER BAR ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:nowrap;overflow:hidden;
  padding:6px 10px;
  background:rgba(0,0,0,0.35);
  border-radius:8px;border:1px solid rgba(200,160,64,0.2);
  flex-shrink:0;gap:8px;
}
#logo{
  font-family:'Bebas Neue',sans-serif;font-size:16px;
  letter-spacing:1px;color:var(--gold2);
  text-shadow:0 1px 8px rgba(200,160,64,0.4);
  flex-shrink:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#status-pill{
  font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1.5px;
  padding:3px 10px;border-radius:20px;
  background:rgba(0,0,0,.4);border:1px solid rgba(200,160,64,0.25);
  color:var(--gold);white-space:nowrap;
}

/* ── SCORE STRIP ── */
#scores{
  display:flex;gap:8px;flex-shrink:0;
}
.score-box{
  flex:1;background:rgba(0,0,0,.35);border-radius:8px;
  border:1px solid rgba(200,160,64,0.15);
  padding:7px 12px;display:flex;align-items:center;gap:10px;
}
.score-box.enemy{}
.score-avatar{
  width:38px;height:38px;border-radius:50%;
  border:2px solid rgba(200,160,64,0.3);
  background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  flex-shrink:0;
}
.score-info{}
.score-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gold2);line-height:1;}
.score-detail{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.5px;margin-top:1px;}
.score-hp{
  margin-top:5px;display:flex;align-items:center;gap:5px;
}
.score-box.enemy .score-hp{}
.hp-bar-outer{flex:1;height:10px;background:rgba(0,0,0,.4);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.1);}
.hp-bar-inner{height:100%;border-radius:5px;transition:width .5s ease,background .4s;}
.hp-text{font-family:'Bebas Neue',sans-serif;font-size:14px;color:rgba(255,255,255,.9);min-width:42px;letter-spacing:1px;}
.

/* ── BATTLE FIELD ── */
#field{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;min-height:0;position:relative;
}

/* deck piles */
.deck-row{
  display:flex;gap:14px;align-items:center;justify-content:center;width:100%;
  padding:0 10px;
}
.deck-pile{
  position:relative;width:80px;height:112px;cursor:pointer;
}
/* stacked card illusion */
.deck-pile::before,.deck-pile::after{
  content:'';position:absolute;
  width:80px;height:112px;border-radius:8px;
  background:var(--card-bg);border:1px solid rgba(0,0,0,.2);
}
.deck-pile::before{top:-3px;left:2px;transform:rotate(-2deg);background:#EDE4C8;}
.deck-pile::after{top:-1px;left:0;transform:rotate(1deg);background:#F0E8D0;}
.deck-top{
  position:absolute;inset:0;border-radius:8px;
  background:var(--card-bg);border:2px solid rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;z-index:2;
  box-shadow:0 4px 14px var(--card-shadow);
}
.deck-back{
  width:100%;height:100%;border-radius:6px;
  background:
    repeating-linear-gradient(45deg,#8B1A1A 0,#8B1A1A 2px,#6B0A0A 2px,#6B0A0A 8px);
  display:flex;align-items:center;justify-content:center;
}
.deck-back::after{
  content:'★';font-size:28px;color:rgba(255,220,100,.3);
}
.deck-count{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;
  color:#FFD700;
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(200,160,40,0.5);
  border-radius:8px;
  padding:2px 10px;
  margin-top:6px;
  white-space:nowrap;
  text-align:center;
}

.deck-label{
  font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;
  color:rgba(255,255,255,.3);text-align:center;margin-top:24px;
}

/* ── ARENA — played cards ── */
#arena{
  display:flex;gap:16px;align-items:center;justify-content:center;
  min-height:130px;width:100%;
}
.arena-slot{
  width:88px;height:124px;border-radius:10px;
  border:2px dashed rgba(200,160,64,0.7);
  background:rgba(0,0,0,0.45);
  box-shadow:0 0 12px rgba(200,160,64,0.15),inset 0 0 20px rgba(0,0,0,0.3);
  position:relative;
  overflow:hidden;
  transition:border-color .3s, box-shadow .3s;
}
.arena-slot.active{border-color:rgba(200,160,64,0.5);}
.arena-slot.slot-win{border-color:#FFE000;box-shadow:0 0 20px rgba(255,220,0,0.5);border-style:solid;}
.arena-slot.slot-lose{border-color:#440000;box-shadow:0 0 12px rgba(180,0,0,0.3);border-style:solid;}
.slot-tag{
  position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
  font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;
  color:rgba(255,255,255,.35);white-space:nowrap;
}

#arena-vs{
  font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;
  color:rgba(255,255,255,.1);flex-shrink:0;
}

/* ── THE CARD — COMIC BOOK STYLE ── */
.card{
  width:88px;height:124px;
  border-radius:6px;
  border:3px solid #111;
  box-shadow:4px 4px 0 #000;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  flex-shrink:0;
  background:#fff;
}

/* halftone dot pattern on all cards */
.card::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background-image:radial-gradient(circle,rgba(0,0,0,.08) 1px,transparent 1px);
  background-size:4px 4px;
}

.card.in-hand:hover{
  transform:translateY(-14px) scale(1.05);
  box-shadow:5px 5px 0 #000;
}
.card.in-hand.selected{
  transform:translateY(-18px) scale(1.07);
  box-shadow:0 0 0 3px #FFE000,5px 5px 0 #000;
}

/* ── ENEMY HAND (smoke reveal) ── */
#e-hand-area .card{
  position:absolute;width:60px;height:84px;font-size:11px;cursor:default;
}
#e-hand-area .card *{pointer-events:none;}
@keyframes smoke-card-in{
  from{transform:translateY(-40px) scale(0.7) rotate(var(--hand-r,0deg));opacity:0;}
  to{transform:translateY(var(--hand-y,0px)) rotate(var(--hand-r,0deg));opacity:1;}
}
#e-hand-area .card{animation:smoke-card-in 0.4s cubic-bezier(.175,.885,.32,1.275) both;}

/* ── SMOKE EFFECT ── */
@keyframes smoke-drift{
  0%  {opacity:0;transform:translateY(0) scale(0.4);}
  20% {opacity:0.85;}
  60% {opacity:0.7;transform:translateY(-18px) scale(1.4);}
  100%{opacity:0;transform:translateY(-36px) scale(1.8);}
}
.smoke-puff{
  position:absolute;border-radius:50%;pointer-events:none;z-index:50;
  background:radial-gradient(circle,rgba(180,180,200,0.75) 0%,rgba(140,140,160,0.3) 60%,transparent 100%);
  animation:smoke-drift 1.2s ease-out forwards;
}
@keyframes card-shuffle{
  0%  {transform:translateY(var(--hand-y,0px)) rotate(var(--hand-r,0deg));}
  25% {transform:translateY(calc(var(--hand-y,0px) - 30px)) rotate(calc(var(--hand-r,0deg) + 25deg)) scale(0.85);}
  50% {transform:translateY(calc(var(--hand-y,0px) - 15px)) rotate(calc(var(--hand-r,0deg) - 15deg)) scale(0.9);}
  75% {transform:translateY(calc(var(--hand-y,0px) - 8px)) rotate(calc(var(--hand-r,0deg) + 8deg)) scale(0.95);}
  100%{transform:translateY(var(--hand-y,0px)) rotate(var(--hand-r,0deg));}
}
.card.shuffling{animation:card-shuffle 0.6s ease-in-out forwards;}
.card.smoked .card-art,.card.smoked .card-name-strip,.card.smoked .card-power,.card.smoked .card-sym,.card.smoked .card-ability-tag{
  filter:blur(4px);opacity:0.15;transition:filter 0.4s,opacity 0.4s;
}
.card.smoked{
  background:#3a3a3a!important;
  border-color:#555!important;
}
.card.smoked .card-header{background:#2a2a2a!important;border-color:#444!important;}
.card.smoked .card-name-strip{background:#2a2a2a!important;}

/* ── DRAW FROM DECK ANIMATION ── */
@keyframes draw-from-deck{
  0%  {transform:translateY(-120px) translateX(var(--dx,0px)) scale(.55) rotate(var(--dr,-15deg));opacity:0;filter:brightness(1.6);}
  40% {opacity:1;filter:brightness(1.2);}
  70% {transform:translateY(12px) translateX(0) scale(1.06) rotate(0deg);}
  100%{transform:translateY(var(--hand-y,0px)) rotate(var(--hand-r,0deg));opacity:1;filter:brightness(1);}
}
.card.drawing{
  animation:draw-from-deck .55s cubic-bezier(.22,.68,0,1.2) forwards;
}

/* play animations */
.card.playing{animation:deal-out .35s cubic-bezier(.175,.885,.32,1.275) forwards;}
@keyframes deal-out{from{transform:translateY(60px) scale(.7) rotate(8deg);opacity:0}to{transform:none;opacity:1}}
.card.enemy-deal{animation:enemy-deal .35s cubic-bezier(.175,.885,.32,1.275) forwards;}
@keyframes enemy-deal{from{transform:translateY(-60px) scale(.7) rotate(-8deg);opacity:0}to{transform:none;opacity:1}}
.card.winner{animation:winner-pulse 1s ease forwards;z-index:10;}
@keyframes winner-pulse{
  0%  {box-shadow:4px 4px 0 #000;transform:scale(1);}
  30% {box-shadow:0 0 0 6px #FFE000,0 0 30px rgba(255,220,0,0.7),4px 4px 0 #000;transform:scale(1.18) translateY(-8px);}
  60% {box-shadow:0 0 0 4px #FFE000,0 0 20px rgba(255,220,0,0.5),4px 4px 0 #000;transform:scale(1.14) translateY(-6px);}
  100%{box-shadow:0 0 0 4px #FFE000,0 0 16px rgba(255,220,0,0.4),4px 4px 0 #000;transform:scale(1.12) translateY(-6px);}
}
.card.loser{animation:loser-shake .5s ease forwards;z-index:5;}
@keyframes loser-shake{
  0%  {transform:scale(1);filter:brightness(1);}
  15% {transform:rotate(-8deg) scale(0.92);filter:brightness(0.5) saturate(0);}
  35% {transform:rotate(7deg) scale(0.9);filter:brightness(0.4) saturate(0);}
  55% {transform:rotate(-5deg) scale(0.88);}
  75% {transform:rotate(4deg) scale(0.88);}
  100%{transform:rotate(-2deg) scale(0.88);filter:brightness(0.45) saturate(0);}
}

/* ── CARD COLOR THEMES (comic flat fills) ── */
/* legendary = gold */
.card.hitman{ background:#1a0000; border-color:#CC0000; box-shadow:4px 4px 0 #000, 0 0 12px rgba(200,0,0,0.5); }
.card.hitman .card-header{ background:#8B0000; border-bottom:3px solid #CC0000; }
.card.hitman .card-name-strip{ background:#8B0000; color:#FF6060; border-top:2px solid #CC0000; }
.card.hitman .card-power{ color:#FF4040; text-shadow:0 0 8px rgba(255,0,0,0.8); }
.card.hitman .card-ability-tag span{ background:#CC0000; color:#fff; border-color:#FF4040; }

.card.legendary{ background:#FFF5CC; border-color:#B8820A; }
.card.legendary .card-header{ background:#FFD700; border-bottom:3px solid #B8820A; }
.card.legendary .card-name-strip{ background:#FFD700; color:#4A2D00; border-top:2px solid #B8820A; }
/* rare = blue-purple */
.card.rare{ background:#D8DCFF; border-color:#3030AA; }
.card.rare .card-header{ background:#5050DD; border-bottom:3px solid #3030AA; }
.card.rare .card-name-strip{ background:#5050DD; color:#fff; border-top:2px solid #3030AA; }
/* common red suit */
.card.common{ background:#2a2a2a; border-color:#555; }
.card.common .card-header{ background:#1a1a1a; border-bottom:2px solid #555; }
.card.common .card-name-strip{ background:#1a1a1a; color:#aaa; border-top:1px solid #444; }
.card.common .card-power{ color:#aaa; }
.card.common .card-art{ background:#e8e8e8; }

.card.red{ background:#2a2a2a; border-color:#555; }
.card.red .card-header{ background:#1a1a1a; border-bottom:2px solid #555; }
.card.red .card-name-strip{ background:#1a1a1a; color:#aaa; border-top:1px solid #444; }
/* common black suit */
.card.black{ background:#2a2a2a; border-color:#555; }
.card.black .card-header{ background:#1a1a1a; border-bottom:2px solid #555; }
.card.black .card-name-strip{ background:#1a1a1a; color:#aaa; border-top:1px solid #444; }

/* ── CARD HEADER (top colour band) ── */
.card-header{
  display:flex;align-items:center;justify-content:flex-start;direction:ltr;
  padding:3px 5px;flex-shrink:0;position:relative;z-index:2;
}
.card-power{
  font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;
  color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.5);
}
.card.legendary .card-power{color:#4A2D00;}
.card-sym{font-size:12px;line-height:1;opacity:.85;}
.card.legendary .card-sym{opacity:.7;}

/* ── CARD ART ── */
.card-art{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:38px;position:relative;z-index:2;
  margin:0;
}

/* speed lines behind art for legendary/rare */
.card.legendary .card-art::before,
.card.rare .card-art::before{
  content:'';position:absolute;inset:0;
  background:repeating-conic-gradient(from 0deg at 50% 50%,rgba(0,0,0,.04) 0deg 6deg,transparent 6deg 12deg);
}

/* ── CARD NAME STRIP ── */
.card-name-strip{
  padding:3px 5px;text-align:center;direction:ltr;
  font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1.5px;
  position:relative;z-index:2;flex-shrink:0;
}

/* ── CARD ABILITY TAG (special cards only) ── */
.card-ability-tag{
  position:absolute;bottom:18px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;z-index:3;
}
.card-ability-tag span{
  font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:.8px;
  padding:1px 5px;border:1.5px solid #111;border-radius:2px;
  background:#FFE000;color:#111;
  box-shadow:1px 1px 0 #000;
}
.card.rare .card-ability-tag span{background:#AA44FF;color:#fff;}
.card.legendary .card-ability-tag span{background:#FF8800;color:#fff;}

/* ── CARD TOOLTIP ── */
#card-tooltip{direction:rtl;
  position:fixed;z-index:200;
  background:rgba(8,4,12,0.97);
  border:1px solid rgba(200,160,40,0.5);
  border-radius:12px;
  padding:14px 16px;
  width:224px;
  pointer-events:none;
  opacity:0;
  transform:translateY(8px) scale(0.94);
  transition:opacity .16s ease,transform .16s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.75),0 0 0 1px rgba(200,160,40,0.1);
}
#card-tooltip.show{opacity:1;transform:translateY(0) scale(1);}
.tt-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tt-art{font-size:32px;line-height:1;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5));}
.tt-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;line-height:1;color:#F0C060;}
.tt-rarity{font-size:9px;letter-spacing:2px;margin-top:3px;}
.tt-rarity.hitman{color:#FF4040;text-shadow:0 0 6px rgba(255,0,0,0.5);}.tt-rarity.legendary{color:#FFD700;}
.tt-rarity.rare{color:#9090FF;}
.tt-rarity.common{color:rgba(255,255,255,.3);}
.tt-divider{height:1px;background:rgba(200,160,40,.2);margin:0 0 10px;}
.tt-power-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tt-power-label{font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.35);}
.tt-power-val{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#F0C060;}
.tt-ability-box{background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.07);padding:8px 10px;}
.tt-ability-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:4px;}
.tt-ability-text{font-size:12px;color:rgba(255,255,255,.85);line-height:1.55;font-family:'Heebo','Special Elite',cursive;}
.tt-hint{font-size:9px;color:rgba(255,255,255,.2);text-align:center;margin-top:10px;letter-spacing:1px;}

/* ── HAND ── */
#hand-area{flex-shrink:0;padding:0 0 4px;overflow:visible;}
#hand{
  display:flex;justify-content:center;align-items:flex-end;
  height:148px;position:relative;
  overflow:visible;
}
/* fan layout via JS */

/* ── LOG ── */
#log-bar{
  background:rgba(0,0,0,.4);border-radius:8px;
  border:1px solid rgba(200,160,64,0.15);
  padding:7px 12px;min-height:44px;max-height:52px;
  overflow-y:auto;scrollbar-width:none;flex-shrink:0;
}
#log-bar::-webkit-scrollbar{display:none;}
.ll{font-size:11px;color:rgba(255,255,255,.4);line-height:1.6;}
.ll.fresh{color:rgba(255,255,255,.85);}
.ll.win{color:#FFD700;}
.ll.lose{color:var(--red2);}
.ll.sys{color:var(--gold);text-align:center;letter-spacing:1px;font-size:10px;}

/* ── RESOLVE OVERLAY ── */
#resolve{
  display:none;position:fixed;inset:0;z-index:200;
  align-items:center;justify-content:center;
  pointer-events:none;
  background:rgba(0,0,0,0);
}
#resolve.show{display:flex;animation:resolve-bg .3s ease forwards;}
@keyframes resolve-bg{to{background:rgba(0,0,0,0.5);}}
#resolve-text{
  font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:6px;
  animation:res-pop .45s cubic-bezier(.175,.885,.32,1.275);
  padding:14px 28px;
  border-radius:8px;
  background:rgba(0,0,0,0.7);
  border:2px solid currentColor;
  box-shadow:0 0 30px currentColor, 0 4px 20px rgba(0,0,0,0.8);
  white-space:nowrap;
}
@keyframes res-pop{from{transform:scale(.2) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes hitman-flicker{0%,100%{opacity:1;text-shadow:0 0 40px #FF0000,0 0 80px rgba(255,0,0,.6)}50%{opacity:0.75;text-shadow:0 0 20px #FF0000,0 0 40px rgba(255,0,0,.3)}}

/* ── DAMAGE POP ── */
.dmg-pop{
  position:fixed;font-family:'Bebas Neue',sans-serif;
  pointer-events:none;z-index:99;
  animation:dpop 1s ease forwards;
}
@keyframes dpop{
  0%{opacity:1;transform:translateY(0) scale(1);}
  55%{opacity:1;transform:translateY(-50px) scale(1.3);}
  100%{opacity:0;transform:translateY(-80px) scale(.9);}
}

/* ── RESULT ── */
#result{
  display:none;position:fixed;inset:0;background:rgba(2,8,2,.92);
  z-index:80;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
#result.show{display:flex;}
#res-big{
  font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;text-align:center;
  animation:stamp .55s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes stamp{from{transform:scale(2.2);opacity:0}to{transform:scale(1);opacity:1}}
#res-small{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:1px;}
#res-btn{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;
  padding:14px 40px;background:transparent;
  border:1px solid rgba(200,160,40,.5);color:var(--gold2);
  cursor:pointer;border-radius:4px;margin-top:8px;transition:all .2s;
}
#res-btn:active{background:rgba(200,160,40,.12);transform:scale(.97);}

/* flash */
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:90;transition:opacity .04s;}
#flash.f{opacity:.12;}

/* draw button */
#draw-btn{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;
  padding:10px 28px;background:rgba(0,0,0,.4);
  border:1px solid rgba(200,160,40,.35);color:var(--gold2);
  cursor:pointer;border-radius:6px;transition:all .2s;
  display:none;
}
#draw-btn:active{background:rgba(200,160,40,.1);transform:scale(.96);}
#draw-btn.show{display:block;}
/* ── ABILITY BANNER ── */
#ability-banner{
  position:absolute;left:50%;transform:translateX(-50%);
  top:50%;margin-top:-36px;
  z-index:30;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:0;transition:opacity .2s;
  width:260px;
}
#ability-banner.show{opacity:1;}
#ab-title{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;
  text-shadow:0 2px 12px rgba(0,0,0,.9);white-space:nowrap;
}
#ab-sub{
  font-family:'Heebo','Special Elite',cursive;font-size:11px;
  color:rgba(255,255,255,.8);text-align:center;
  text-shadow:0 1px 6px rgba(0,0,0,.9);line-height:1.4;
}

/* card effect flash overlay */
.card-fx{
  position:absolute;inset:0;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);
  text-align:center;z-index:10;pointer-events:none;
  animation:fx-flash .8s ease forwards;
}
@keyframes fx-flash{
  0%{opacity:0;transform:scale(.8);}
  20%{opacity:1;transform:scale(1.05);}
  70%{opacity:1;}
  100%{opacity:0;transform:scale(1);}
}

/* ── CODEX BUTTON ── */
#home-btn{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1.5px;
  padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;
  background:rgba(40,80,40,0.14);
  border:1px solid rgba(80,160,80,0.4);
  color:#80C080;transition:all .18s;flex-shrink:0;
}
#home-btn:active{background:rgba(40,80,40,0.26);transform:scale(.95);}
#shop-btn{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1.5px;
  padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;
  background:rgba(200,80,200,0.14);
  border:1px solid rgba(200,80,200,0.4);
  color:#E080E0;transition:all .18s;flex-shrink:0;
}
#shop-btn:active{background:rgba(200,80,200,0.26);transform:scale(.95);}
#codex-btn{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1.5px;
  padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;
  background:rgba(200,160,40,0.14);
  border:1px solid rgba(200,160,40,0.4);
  color:var(--gold2);transition:all .18s;flex-shrink:0;
}
#codex-btn:active{background:rgba(200,160,40,0.26);transform:scale(.95);}

/* ── CODEX OVERLAY ── */
#codex{
  display:none;position:fixed;inset:0;z-index:350;
  background:rgba(4,2,8,0.88);
  align-items:flex-end;justify-content:center;
}
#codex.open{display:flex;}

#codex-panel{
  width:100%;max-width:430px;
  max-height:92vh;
  background:#0C0810;
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(200,160,40,0.3);
  border-left:1px solid rgba(200,160,40,0.1);
  border-right:1px solid rgba(200,160,40,0.1);
  display:flex;flex-direction:column;
  animation:slide-up .3s cubic-bezier(.25,.8,.25,1);
  overflow:hidden;
}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}

#codex-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(200,160,40,0.15);
  flex-shrink:0;
}
#codex-title{
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:3px;color:var(--gold2);
}
#codex-close{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
#codex-close:active{background:rgba(255,255,255,.12);transform:scale(.92);}

#codex-filters{direction:rtl;
  display:flex;gap:6px;padding:10px 14px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
#codex-filters::-webkit-scrollbar{display:none;}
.cf-btn{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1.5px;
  padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.4);transition:all .15s;flex-shrink:0;
}
.cf-btn.active{
  background:rgba(200,160,40,0.15);border-color:rgba(200,160,40,0.4);color:var(--gold2);
}
.cf-btn.hitman-btn{border-color:rgba(200,0,0,.5);color:#FF6060;}
.cf-btn.hitman-btn.active{background:rgba(180,0,0,.35);border-color:#CC0000;}
.cf-btn:active{transform:scale(.95);}

#codex-grid{
  overflow-y:auto;padding:10px 12px 24px;
  display:flex;flex-direction:column;gap:8px;
  flex:1;scrollbar-width:thin;scrollbar-color:rgba(200,160,40,0.2) transparent;
}

/* codex mini card — comic style */
.cx-mini-card{
  width:52px;height:72px;border-radius:5px;
  border:2.5px solid #111;
  box-shadow:2px 2px 0 #000;
  display:flex;flex-direction:column;
  flex-shrink:0;position:relative;overflow:hidden;
  background:#F4F4F4;
}
.cx-mini-card.hitman{background:#1a0000;border-color:#CC0000;box-shadow:0 0 8px rgba(200,0,0,0.4);}
.cx-mini-card.hitman .cx-mini-hdr{background:#8B0000;border-bottom:2px solid #CC0000;}
.cx-mini-card.hitman .cx-stripe{background:#8B0000;border-top:2px solid #CC0000;}
.cx-mini-card.hitman .cx-pow{color:#FF6060;}
.cx-mini-card.hitman .cx-art{color:#FF4040;}
.cx-mini-card.legendary{background:#FFF5CC;border-color:#B8820A;}
.cx-mini-card.legendary .cx-mini-hdr{background:#FFD700;border-bottom:2px solid #B8820A;}
.cx-mini-card.legendary .cx-stripe{background:#FFD700;border-top:2px solid #B8820A;}
.cx-mini-card.rare{background:#EEF0FF;border-color:#3030AA;}
.cx-mini-card.rare .cx-mini-hdr{background:#5050DD;border-bottom:2px solid #3030AA;}
.cx-mini-card.rare .cx-stripe{background:#5050DD;border-top:2px solid #3030AA;}
.cx-mini-card.common{background:#2a2a2a !important;border-color:#555 !important;}
.cx-mini-card.common .cx-mini-hdr{background:#1a1a1a !important;border-bottom:2px solid #555 !important;}
.cx-mini-card.common .cx-stripe{background:#1a1a1a !important;border-top:1px solid #444 !important;}
.cx-mini-card.common .cx-pow{color:#aaa;}
.cx-mini-card.common .cx-art{color:#fff;}

.cx-mini-card.red-card{background:#FFF0F0;border-color:#880000;}
.cx-mini-card.red-card .cx-mini-hdr{background:#CC2200;border-bottom:2px solid #880000;}
.cx-mini-card.red-card .cx-stripe{background:#CC2200;border-top:2px solid #880000;}
.cx-mini-card .cx-mini-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:2px 4px;background:#222;border-bottom:2px solid #111;flex-shrink:0;
}
.cx-pow{font-family:'Bebas Neue',sans-serif;font-size:13px;color:#fff;line-height:1;}
.cx-mini-card.legendary .cx-pow{color:#4A2D00;}
.cx-sym{font-size:9px;color:rgba(255,255,255,.7);line-height:1;}
.cx-art{font-size:20px;line-height:1;flex:1;display:flex;align-items:center;justify-content:center;}
.cx-stripe{
  background:#222;border-top:2px solid #111;
  display:flex;align-items:center;justify-content:center;padding:2px 0;flex-shrink:0;
}
.cx-cname{font-family:'Bebas Neue',sans-serif;font-size:7px;letter-spacing:1px;color:#fff;}
.cx-row{
  direction:rtl;
  display:flex;gap:12px;align-items:center;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:10px 14px;
  transition:border-color .15s;
}
.cx-row:active{border-color:rgba(200,160,40,.3);background:rgba(200,160,40,.05);}
.cx-row.hitman{border-color:rgba(200,0,0,.5);background:rgba(120,0,0,.15);box-shadow:0 0 10px rgba(200,0,0,0.15);}
.cx-row.legendary{border-color:rgba(200,160,40,.25);background:rgba(200,160,40,.05);}
.cx-row.rare{border-color:rgba(80,80,200,.2);background:rgba(80,80,200,.04);}

/* mini card */
.cx-mini-card{
  width:52px;height:72px;border-radius:7px;
  background:var(--card-bg);border:1.5px solid rgba(0,0,0,.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;flex-shrink:0;position:relative;overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,.5);
}
.cx-mini-card::before{content:'';position:absolute;inset:3px;border-radius:4px;border:1px solid rgba(0,0,0,.08);}
.cx-mini-card.legendary{border-color:rgba(200,160,40,.6);box-shadow:0 0 0 1px rgba(200,160,40,.3),0 3px 10px rgba(0,0,0,.5);}
.cx-mini-card.rare{border-color:rgba(80,80,200,.5);box-shadow:0 0 0 1px rgba(80,80,200,.2),0 3px 10px rgba(0,0,0,.5);}
.cx-art{font-size:20px;line-height:1;position:relative;z-index:1;}
.cx-pow{
  font-family:'Bebas Neue',sans-serif;font-size:13px;position:relative;z-index:1;
  color:var(--suit-b);line-height:1;
}
.cx-mini-card.red-card .cx-pow{color:var(--suit-r);}
.cx-stripe{
  position:absolute;bottom:0;left:0;right:0;height:16px;
  background:rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;
}
.cx-cname{font-family:'Bebas Neue',sans-serif;font-size:7px;letter-spacing:1px;color:rgba(0,0,0,.55);}

/* cx info */
.cx-info{flex:1;min-width:0;}
.cx-name-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.cx-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:rgba(255,255,255,.9);}
.cx-badge{
  font-size:8px;letter-spacing:1.5px;padding:2px 7px;border-radius:10px;
  font-family:'Bebas Neue',sans-serif;
}
.cx-badge.hitman{background:rgba(180,0,0,.3);color:#FF6060;border:1px solid rgba(200,0,0,.5);}
.cx-badge.legendary{background:rgba(200,160,40,.2);color:var(--gold2);border:1px solid rgba(200,160,40,.35);}
.cx-badge.rare{background:rgba(80,80,200,.2);color:#9090FF;border:1px solid rgba(80,80,200,.3);}
.cx-badge.common{background:rgba(255,255,255,.06);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);}
.cx-ability{
  direction:rtl;text-align:right;
  font-family:'Heebo','Special Elite',cursive;font-size:11px;
  color:rgba(255,255,255,.55);line-height:1.5;
}
.cx-ability.has-effect{color:rgba(255,220,100,.75);}
.cx-power-pill{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;
  color:var(--gold2);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
}
.cx-power-pill span{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.25);}


/* ── SKIN SHOP ── */
#shop{
  display:none;position:fixed;inset:0;z-index:350;
  background:rgba(4,2,8,0.88);
  align-items:flex-end;justify-content:center;
}
#shop.open{display:flex;}
#shop-panel{
  width:100%;max-width:430px;
  max-height:92vh;
  background:#0C0810;
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(200,80,200,0.3);
  display:flex;flex-direction:column;
  overflow:hidden;
}
#shop-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 10px;
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
}
#shop-title{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;
  color:#E080E0;
}
#shop-close{
  font-size:16px;background:none;border:none;color:rgba(255,255,255,.4);
  cursor:pointer;padding:4px 8px;
}
#shop-grid{
  overflow-y:auto;padding:14px 12px 30px;
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  flex:1;scrollbar-width:thin;scrollbar-color:rgba(200,80,200,0.2) transparent;
  direction:rtl;
}
.skin-card{
  border-radius:14px;padding:14px 10px 12px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;transition:all .2s;position:relative;
}
.skin-card:active{transform:scale(.96);}
.skin-card.selected{border-color:#E080E0;background:rgba(200,80,200,.1);box-shadow:0 0 14px rgba(200,80,200,.2);}
.skin-card.selected::after{
  content:'✓';position:absolute;top:8px;left:10px;
  font-size:14px;color:#E080E0;font-weight:bold;
}
.skin-preview{
  width:64px;height:88px;border-radius:8px;
  border:2.5px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;box-shadow:3px 3px 0 rgba(0,0,0,.5);
  flex-shrink:0;
}
.skin-name{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;
  color:rgba(255,255,255,.85);text-align:center;
}
.skin-desc{
  font-family:'Heebo',sans-serif;font-size:10px;
  color:rgba(255,255,255,.35);text-align:center;line-height:1.4;
}

/* ── SKIN ANIMATIONS ── */
@keyframes skin-classic  { 0%,100%{box-shadow:inset 0 0 0 transparent} 50%{box-shadow:inset 0 0 12px rgba(255,180,50,.25)} }
@keyframes skin-midnight { 0%{background-position:0 0} 100%{background-position:40px 40px} }
@keyframes skin-gold     { 0%,100%{box-shadow:0 0 6px rgba(255,200,0,.3)} 50%{box-shadow:0 0 22px rgba(255,220,50,.7),inset 0 0 10px rgba(255,200,0,.2)} }
@keyframes skin-neon-pulse { 0%,100%{box-shadow:0 0 4px rgba(0,255,150,.3)} 50%{box-shadow:0 0 18px rgba(0,255,150,.9),inset 0 0 8px rgba(0,255,150,.2)} }
@keyframes skin-blood-drip { 0%,100%{filter:brightness(1)} 25%{filter:brightness(1.3) contrast(1.2)} 50%{filter:brightness(0.7)} 75%{filter:brightness(1.4) contrast(0.9)} }
@keyframes skin-ocean-wave { 0%{background-position:0 0} 50%{background-position:20px -20px} 100%{background-position:0 0} }
@keyframes skin-ice-glow{ 0%,100%{box-shadow:0 0 6px rgba(160,50,255,.4)} 50%{box-shadow:0 0 22px rgba(180,80,255,.9),inset 0 0 10px rgba(140,30,255,.2)} }
@keyframes skin-fire-heat{ 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18) sepia(.3)} }

.deck-back.skin-classic  { animation:skin-classic   2.5s ease-in-out infinite; }
.deck-back.skin-midnight { animation:skin-midnight  3s linear infinite; background-size:8px 8px !important; }
.deck-back.skin-gold     { animation:skin-gold      1.8s ease-in-out infinite; }
.deck-back.skin-neon     { animation:skin-neon-pulse 1.2s ease-in-out infinite; }
.deck-back.skin-blood    { animation:skin-blood-drip 1.5s ease-in-out infinite; }
.deck-back.skin-ocean    { animation:skin-ocean-wave 3s ease-in-out infinite; background-size:8px 8px !important; }
.deck-back.skin-purple   { animation:skin-ice-glow 1.6s ease-in-out infinite; }
.deck-back.skin-desert   { animation:skin-fire-heat 2s ease-in-out infinite; }

/* ── MOBILE FIXES ── */
@media (max-width: 430px) {
  #resolve-text{ font-size:36px; letter-spacing:4px; padding:12px 20px; }
  .card{ width:72px; height:102px; }
  .card-art{ font-size:30px; }
  .card-name-strip{ font-size:8px; }
  .card-power{ font-size:15px; }
  #hand{ height:130px; }
  .score-name{ font-size:12px; }
  .score-detail{ font-size:8px; }
  #logo{ font-size:16px; letter-spacing:2px; }
}
.arena-slot > .card{
  width:100% !important;
  height:100% !important;
  flex-shrink:0;
  border-radius:8px !important;
}

.btn-label{ display:inline; }
@media(max-width:380px){ .btn-label{ display:none; } }

@media(max-height:700px){
  #topbar{ padding:3px 8px; }
  #logo{ font-size:14px; }
  .score-box{ padding:4px 8px; }
  .score-avatar{ width:30px;height:30px;font-size:16px; }
  .score-name{ font-size:12px; }
  .score-detail{ display:none; }
  .hp-bar-outer{ height:7px; }
  .hp-text{ font-size:11px; }
  #field{ gap:4px; }
  .deck-pile{ width:60px;height:84px; }

  .deck-count{ font-size:9px; }
  .deck-label{ font-size:8px;margin-top:18px; }
  #arena{ min-height:90px; }
  .arena-slot{ width:70px;height:98px; }
  .arena-slot > .card{ width:70px !important;height:98px !important; }
  #log-bar{ min-height:30px;max-height:36px;padding:4px 8px; }
  .ll{ font-size:9px; }

}

@media(max-width:500px){

  #topbar{ padding:4px 8px; }
  #logo{ font-size:13px; letter-spacing:1px; }
  #shop-btn, #codex-btn{ font-size:9px; padding:3px 7px; }
  .btn-label{ display:none; }
  .score-box{ padding:4px 8px; }
  .score-avatar{ width:28px;height:28px;font-size:14px; }
  .score-name{ font-size:11px; }
  .score-detail{ display:none; }
  .hp-bar-outer{ height:6px; }
  .hp-text{ font-size:10px; min-width:34px; }
  .score-hp{ margin-top:3px; }
  #scores{ gap:4px; }
  .deck-pile{ width:58px;height:82px; }
  .deck-pile::before,.deck-pile::after{ width:58px;height:82px; }
  .deck-label{ font-size:8px; margin-top:16px; }
  .deck-count{ font-size:9px; }
  #arena{ min-height:88px; gap:10px; }
  .arena-slot{ width:66px;height:92px; }
  .arena-slot > .card{ width:66px !important;height:92px !important; }
  #arena-vs{ font-size:20px; }
  #log-bar{ min-height:28px;max-height:34px;padding:3px 8px; }
  .ll{ font-size:9px;line-height:1.4; }
  #hand{ height:115px; }
  .card{ width:72px;height:100px; }
  .card-art{ font-size:28px; }
  .card-power{ font-size:14px; }
  .card-name-strip{ font-size:8px; padding:2px 3px; }
}

#mobile-bottom-bar{
  display:none;
}

    display:flex;
    gap:8px;
    padding:6px 10px;
    background:rgba(0,0,0,0.85);
    border-top:1px solid rgba(200,160,64,0.3);
    justify-content:center;

    position:fixed;
    bottom:0;left:0;right:0;

  }

function buildDeck(){
  let d=[];
  // 20 cards: 4 rare, 16 common (hitman NOT in initial deck)
  const rare=CARDS.filter(c=>c.rarity==='rare');
  const common=CARDS.filter(c=>!c.rarity);
  d.push(...rare.slice(0,4));
  const cpool=[...common,...common];
  for(let i=d.length;i<20;i++) d.push(cpool[i%cpool.length]);
  return shuffle(d.map((c,i)=>({...c,uid:i})));
}

function tryDrawLegendary(){
  // 10% chance on each draw to get a legendary instead
  if(Math.random()<0.15){
    const legs=CARDS.filter(c=>c.rarity==='legendary'||c.rarity==='hitman');
    const c={...legs[Math.floor(Math.random()*legs.length)]};
    c.uid=Date.now()+Math.random();
    return c;
  }
  return null;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// drawCard: normal draw, no legendary chance (used for auto-refill)
function drawCard(who){
  const deck=who==='p'?G.pDeck:G.eDeck;
  const hand=who==='p'?G.pHand:G.eHand;
  if(!deck.length) return false;
  hand.push(deck.pop());
  return true;
}

// drawCardManual: player manually draws
// Hitman chance = starts at 5% and grows as deck shrinks (max 80% when 1 card left)
function drawCardManual(){
  if(G.pDrewThisRound){ addLog('כבר שלפת קלף בתור זה!','sys'); return false; }
  if(!G.pDeck.length){ addLog('החפיסה ריקה!','sys'); return false; }

  // Hitman chance: 5% base, increases as deck shrinks
  const deckSize=G.pDeck.length;
  const maxDeck=20;
  // Last card = 100% hitman (only if not already drawn this game)
  const hitmanChance=(!G.hitmanDrawn&&deckSize===1)?1.0:(G.hitmanDrawn?0:0.05+(1-deckSize/maxDeck)*0.75);
  
  if(!G.hitmanDrawn && Math.random()<hitmanChance){
    const hitmanCard=CARDS.find(c=>c.rarity==='hitman');
    const leg={...hitmanCard, uid:Date.now()+Math.random()};
    G.pHand.push(leg);
    G.pDrewThisRound=true;
    G.hitmanDrawn=true;
    addLog('🕴️ שלפת את ההיטמן!','sys');
    const newUids=[leg.uid];
    renderHand(newUids);
    setTimeout(()=>triggerInstantKill(leg), 400);
    return true;
  }

  G.pHand.push(G.pDeck.pop());
  G.pDrewThisRound=true;
  const newCard=G.pHand[G.pHand.length-1];
  sfxDraw();
  renderHand([newCard.uid]);
  return true;
}

let ttTimer=null, ttVisible=false;
const TT=document.getElementById('card-tooltip');

function showTooltip(card, cardEl){
  document.getElementById('tt-art').textContent=card.art;
  document.getElementById('tt-name').textContent=card.name;
  const rEl=document.getElementById('tt-rarity');
  const rar=card.rarity||'common';
  rEl.textContent=rarHe(rar);
  rEl.className='tt-rarity '+rar;
  document.getElementById('tt-power').textContent=card.power;
  document.getElementById('tt-ability').textContent=card.ability||'אין יכולת מיוחדת.';

  // position: above the card
  const r=cardEl.getBoundingClientRect();
  const tw=224, th=200;
  let left=r.left+r.width/2-tw/2;
  let top=r.top-th-12;
  // clamp horizontally
  left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
  // if no space above, show below
  if(top<8) top=r.bottom+12;
  TT.style.left=left+'px';
  TT.style.top=top+'px';
  TT.classList.add('show');
  ttVisible=true;
}

function hideTooltip(){
  TT.classList.remove('show');
  ttVisible=false;
  if(ttTimer){clearTimeout(ttTimer);ttTimer=null;}
}

function attachTooltip(el, card){
  let holdFired=false;
  let startX=0, startY=0;
  let moved=false;

  el.addEventListener('touchstart', e=>{
    holdFired=false;
    moved=false;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    ttTimer=setTimeout(()=>{
      holdFired=true;
      showTooltip(card, el);
    }, 400);
  },{passive:true});

  el.addEventListener('touchmove', e=>{
    const dx=Math.abs(e.touches[0].clientX-startX);
    const dy=Math.abs(e.touches[0].clientY-startY);
    if(dx>8||dy>8){ moved=true; clearTimeout(ttTimer); ttTimer=null; }
  },{passive:true});

  el.addEventListener('touchend', e=>{
    clearTimeout(ttTimer); ttTimer=null;
    if(holdFired){
      hideTooltip();
      e.preventDefault(); // don't fire click
    } else if(!moved){
      hideTooltip();
      // fire play directly — don't rely on onclick
      e.preventDefault();
      selectCard(card.uid);
    }
    holdFired=false; moved=false;
  });

  // Mouse only — no interference with touch
  el.addEventListener('mouseenter',()=>{ if(!('ontouchstart' in window)) showTooltip(card,el); });
  el.addEventListener('mouseleave',()=>{ if(!('ontouchstart' in window)) hideTooltip(); });
}

// ── RENDER HAND ── fan layout
let _renderedUids=new Set();

function renderHand(newUids=[]){
  const wrap=document.getElementById('hand');
  wrap.innerHTML='';

  const cards=G.pHand;
  const n=cards.length;
  if(!n){ _renderedUids=new Set(); return; }
  const spread=Math.min(30,n*8);

  cards.forEach((c,i)=>{
    const angle=n>1?(-spread/2)+(spread/(n-1||1))*i:0;
    const yOff=Math.abs(angle)*0.6;
    const isNew=newUids.includes(c.uid);

    const el=makeCardEl(c,true);
    el.style.position='absolute';
    el.style.left=`calc(50% + ${(i-(n-1)/2)*44}px - 44px)`;
    el.style.zIndex=i+1;
    el.style.transformOrigin='bottom center';
    el.classList.add('in-hand');
    el.onclick=()=>selectCard(c.uid);
    attachTooltip(el,c);
    wrap.appendChild(el);

    if(isNew){
      const delay=newUids.indexOf(c.uid)*90;
      const dx=(Math.random()-0.5)*40;
      const dr=(Math.random()-0.5)*20;
      el.style.setProperty('--dx', dx+'px');
      el.style.setProperty('--dr', dr+'deg');
      el.style.setProperty('--hand-y', yOff+'px');
      el.style.setProperty('--hand-r', angle+'deg');
      el.style.animationDelay=delay+'ms';
      el.classList.add('drawing');
      // remove animation class and fix transform after it finishes
      setTimeout(()=>{
        el.classList.remove('drawing');
        el.style.animationDelay='';
        el.style.transform=`translateY(${yOff}px) rotate(${angle}deg)`;
      }, 560+delay);
    } else {
      el.style.transform=`translateY(${yOff}px) rotate(${angle}deg)`;
    }
  });
  _renderedUids=new Set(cards.map(c=>c.uid));
}

function makeCardEl(c, inHand){
  const rar = c.rarity || (c.suit==='red' ? 'red' : 'black');

  // ── name strip at bottom ──
  const nm = document.createElement('div');

  // ── ability tag badge (only for special cards) ──

let selectedUid=null;
function selectCard(uid){
  if(G.busy||G.phase!=='select') return;
  // Check if player has no cards — instant loss
  if(G.pHand.length===0 && G.pDeck.length===0){
    G.pHp=0; updateUI(); showFinalResult(); return;
  }
  G.pDrewThisRound=false;
  G.hitmanExposed=false;
  selectedUid=uid;
  // remove smoke when player picks a card
  if(G.pSmoked){ unSmokePlayerHand(); G.pSmoked=false; }
  document.querySelectorAll('#hand .card').forEach(el=>{
    el.classList.toggle('selected',parseInt(el.dataset.uid)===uid);
  });
  // short delay then play
  setTimeout(()=>playRound(uid),320);
}

async function playRound(uid){
  if(G.busy) return;
  G.busy=true;
  G.phase='resolve';
  document.getElementById('status-pill').textContent='קרב';

  // ── SHOW REVEALED HAND IF SPY WAS PLAYED LAST ROUND ──
  maybeShowRevealedHand();

  // ── APPLY DOTS FROM PREVIOUS ROUND ──
  if(G.eBleed>0){
    G.eHp=Math.max(0,G.eHp-G.eBleed);
    addLog(`🩸 דימום! הברון מאבד ${G.eBleed} HP`,'win');
    G.eBleed=0;
    updateUI();
  }
  if(G.ePoison>0){
    G.eHp=Math.max(0,G.eHp-G.ePoison);
    addLog(`☠️ רעל! הברון מאבד ${G.ePoison} HP`,'win');
    G.ePoison=0;
    updateUI();
  }

  // find player card
  const idx=G.pHand.findIndex(c=>c.uid===uid);
  if(idx===-1){G.busy=false;return;}
  const pCard=G.pHand.splice(idx,1)[0];
  G.pCard=pCard;

  // Baron draws if his hand is smaller than player hand or if hand is empty
  if(G.eDeck.length && G.eHand.length <= G.pHand.length){ drawCard('e'); }
  // Clear revealed hand now that baron picks
  if(G.eHandRevealed){
    G.eHandRevealed=false;
    hideEnemyHandRevealed();
    hideAbilityBanner();
  }
  let eIdx;
  if(G.eForceWeak && G.eHand.length>0){
    G.eForceWeak=false;
    // find index of card with lowest power
    eIdx=G.eHand.reduce((mi,c,i,arr)=>c.power<arr[mi].power?i:mi, 0);
    showAbilityBanner('⚡ מלכודת פעילה','הברון נאלץ לשחק את הקלף החלש ביותר!','#FFFF40');
    await sleep(800);
  } else {
    eIdx=Math.floor(Math.random()*G.eHand.length);
  }
  const eCard=G.eHand.splice(eIdx,1)[0];
  G.eCard=eCard;

  // show player card in arena
  const pSlot=document.getElementById('p-slot');
  pSlot.innerHTML='<div class="slot-tag">אתה</div>';
  const pEl=makeCardEl(pCard,false);
  pEl.classList.add('playing'); sfxPlay(); if(pCard.effect) sfxAbility(pCard.effect);
  pEl.style.width='88px'; pEl.style.height='124px'; pEl.style.flexShrink='0';
  pSlot.appendChild(pEl);
  pSlot.classList.add('active');

  // show enemy card face-down briefly, then reveal
  const eSlot=document.getElementById('e-slot');
  eSlot.innerHTML='<div class="slot-tag">אויב</div>';
  const _s=SKINS.find(s=>s.id===currentSkin)||SKINS[0];
  const eFaceDown=document.createElement('div');
  eFaceDown.className='enemy-deal';
  eFaceDown.style.cssText=`width:88px;height:124px;border-radius:6px;border:3px solid #111;box-shadow:4px 4px 0 #000;background:${_s.bg};display:flex;align-items:center;justify-content:center;font-size:32px;color:${_s.color};flex-shrink:0;`;
  eFaceDown.textContent=_s.emoji;
  eSlot.appendChild(eFaceDown);
  eSlot.classList.add('active');

  await sleep(600);

  // ── APPLY SPECIAL EFFECTS ──
  let pPow=pCard.power, ePow=eCard.power;

  // ── SPY: keep enemy card face-down, then reveal dramatically ──
  if(pCard.effect==='reveal'){
    // Reveal all cards in baron's hand for next turn
    G.eHandRevealed=true;
    showAbilityBanner('🔍 מרגל הופעל','כל קלפי הברון חשופים לתור הבא!','#60C8E8');
    // Show enemy hand cards face-up temporarily
    showEnemyHandRevealed();
    await sleep(2000);
    hideEnemyHandRevealed();
    hideAbilityBanner();
    eSlot.innerHTML='<div class="slot-tag">אויב</div>';
    const eElReveal=makeCardEl(eCard,false);
    eElReveal.classList.add('enemy-deal');
    eElReveal.style.width='88px'; eElReveal.style.height='124px'; eElReveal.style.flexShrink='0';
    eSlot.appendChild(eElReveal);
    showAbilityBanner('🔍 מידע מאושר','הברון שיחק '+eCard.name+' (כוח '+eCard.power+')','#60C8E8');
    await sleep(800);
    var eEl=eElReveal;
  } else {

  // enemy card effects (blocked if stunned)

  } else {
  if(eCard.effect==='swap'){

    showAbilityBanner('🔄 החלפה של הברון','אם הברון ינצח — ידך תתחלף!','#FF8060');
    // Animate player hand cards flying around
    const pDeckEl=document.getElementById('p-deck');

    const handCards=document.querySelectorAll('#hand .card');
    const count=handCards.length;
    handCards.forEach((el,i)=>{
      const r=el.getBoundingClientRect();

      setTimeout(()=>{
        el.style.transform=`translate(${tx}px,${ty}px) rotate(${angle}deg) scale(0.3)`;
        el.style.opacity='0.3';
      }, i*50+100);
      setTimeout(()=>{
        el.style.transform='';
        el.style.opacity='';
        el.style.transition='';
      }, 700+i*50);
    });
    await sleep(900);
  }
  if(eCard.effect==='double'){
    ePow*=2;
    flashCardEffect(eEl,'💥 ×2 POWER!','rgba(255,100,20,0.45)');
    showAbilityBanner('💣 פצצת הברון','כוח הברון מוכפל ל-'+ePow,'#FF8040');
    await sleep(900);
  }
  if(eCard.effect==='pierce'){
    if(G.pShield>0){
      G.pShield=0;
      flashCardEffect(pEl,'🎯 SHIELD BROKEN!','rgba(255,60,20,0.5)');
      showAbilityBanner('🎯 צלף הברון','המגן שלך הושמד!','#FF4020');
    } else {
      showAbilityBanner('🎯 צלף הברון','חודר שריון — מתעלם ממגניך','#FF4020');
    }
    await sleep(900);
  }
  if(eCard.effect==='hack'){
    pPow=Math.floor(pPow*2/3);
    flashCardEffect(pEl,'💻 HACKED!','rgba(40,200,100,0.35)');
    showAbilityBanner('💻 האקר הברון','הכוח שלך קוצץ ל-'+pPow,'#60E880');

  }
  if(eCard.effect==='shield'){

    flashCardEffect(eEl,'🛡️ SHIELDED','rgba(80,180,255,0.35)');
    showAbilityBanner('🛡️ שומר הברון','הברון מוגן מהמכה הבאה (-2 נזק)','#80C8FF');
    await sleep(900);
  }
  // Baron can also use common abilities

  if(eCard.effect==='execute'){
    if(G.pHp<30){ ePow*=2;
      flashCardEffect(eEl,'🪢 חיסול!','rgba(180,0,0,0.5)');
      showAbilityBanner('🪢 חנק הברון','HP נמוך — נזק הברון מוכפל ל-'+ePow,'#FF2020');

    }
  }
  if(eCard.effect==='armor'){

  }
  } // end !eStunned

  hideAbilityBanner();

  // compare & resolve
  let dmgToE=0,dmgToP=0;

  if(pPow>ePow){

    G._roundWinner='player';

    if(G._swapPending){
      G._swapPending=false;

      await sleep(500);
      G.eHand=[];
      for(let i=0;i<count&&G.eDeck.length;i++) drawCard('e');
      // Animate new cards in
      for(let i=0;i<count;i++){

  flashScreen();

  const isLegendary = c => c.rarity==='legendary'||c.rarity==='hitman';
  G._winnerCard = G._roundWinner==='player' && !isLegendary(pCard) ? pCard : null;
  G._baronWinCard = G._roundWinner==='baron' && !isLegendary(eCard) ? eCard : null;
  G._roundWinner=null;

  await sleep(1400);

  // clear resolve
  document.getElementById('resolve').classList.remove('show');

  // check game end
  if(G.pHp<=0||G.eHp<=0||(!G.pDeck.length&&!G.pHand.length)||(!G.eDeck.length&&!G.eHand.length)){
    await sleep(300);

  // clear arena
  pSlot.innerHTML='<div class="slot-tag">אתה</div>';

  if(G.pSmoked){ unSmokePlayerHand(); G.pSmoked=false; }

  // no auto-refill for either player
  const _beforeRefill=new Set(G.pHand.map(c=>c.uid));
  // ── RETURN WINNING CARD DIRECTLY TO HAND ──
  if(G._winnerCard){
    const rc={...G._winnerCard, uid:Date.now()+Math.random()};
    G.pHand.push(rc);

  }
  if(G._baronWinCard){
    G.eHand.push({...G._baronWinCard, uid:Date.now()+Math.random()+1000});

  }

  const _newUids=G.pHand.filter(c=>!_beforeRefill.has(c.uid)).map(c=>c.uid);

  renderHand(_newUids);
  updateUI();

  G.busy=false;
  if(G.pHand.length===0){
    // Hand empty — instant loss regardless of deck
    await sleep(300);
    G.pHp=0; updateUI();
    addLog('היד שלך ריקה — הפסדת!','lose');
    await sleep(500);
    showFinalResult();
    return;
  }
  G.phase='select';
  document.getElementById('status-pill').textContent='בחר';
  addLog('★ בחר קלף לשחק','sys');

function showResolve(txt,col){
  const r=document.getElementById('resolve');
  document.getElementById('resolve-text').textContent=txt;
  document.getElementById('resolve-text').style.color=col;
  r.classList.add('show');
}

function popDmg(dmg,el,big){
  const r=el.getBoundingClientRect();
  const d=document.createElement('div');
  d.className='dmg-pop';
  d.style.left=(r.left+r.width/2-16)+'px';
  d.style.top=(r.top+r.height*.2)+'px';
  d.style.fontSize=big?'34px':'24px';
  d.style.color=big?'var(--red2)':'#EE8844';
  d.textContent='-'+dmg+(big?'!!':'');
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1100);
}

function flashScreen(){
  const f=document.getElementById('flash');
  f.classList.add('f');
  setTimeout(()=>f.classList.remove('f'),70);
}

function addLog(msg,cls=''){
  const w=document.getElementById('log-bar');
  w.querySelectorAll('.ll.fresh').forEach(e=>e.classList.remove('fresh'));
  const el=document.createElement('div');
  el.className='ll fresh'+(cls?' '+cls:'');
  el.textContent=msg;
  w.appendChild(el);
  w.scrollTop=w.scrollHeight;
  while(w.children.length>6) w.removeChild(w.firstChild);
}

function updateUI(){
  const pp=G.pHp, ep=G.eHp;
  const pb=document.getElementById('p-hp');
  pb.style.width=pp+'%';
  pb.style.background=pp<20?'#AA1111':pp<50?'#997722':'#2A7A3A';
  document.getElementById('p-hp-txt').textContent=G.pHp+' hp';
  const eb=document.getElementById('e-hp');

function renderCodex(filter){
  const grid=document.getElementById('codex-grid');
  grid.innerHTML='';

  // sort: legendary first, then rare, then common; within group sort by power desc
  const rarOrder={hitman:-1,legendary:0,rare:1,common:2,undefined:2};
  const sorted=[...CARDS].sort((a,b)=>{
    const rd=(rarOrder[a.rarity||'common'])-(rarOrder[b.rarity||'common']);
    return rd!==0?rd:b.power-a.power;
  });

  const filtered=filter==='all'?sorted:sorted.filter(c=>(c.rarity||'common')===filter);

  filtered.forEach(c=>{
    const rar = c.rarity||'common';
    const miniCls = c.rarity ? rar : 'common';

    const hasEffect = !!c.effect;

    const row = document.createElement('div');
    row.className = 'cx-row ' + rar;

    const mini=document.createElement('div');
    mini.className=`cx-mini-card ${miniCls}`;
    mini.innerHTML=`
      <div class="cx-mini-hdr"><span class="cx-pow">${c.power}</span></div>
      <div class="cx-art">${c.art}</div>
      <div class="cx-stripe"><div class="cx-cname">${c.name}</div></div>
    `;

    // info
    const info=document.createElement('div');
    info.className='cx-info';
    info.innerHTML=`
      <div class="cx-name-row">
        <div class="cx-name">${c.name}</div>
        <div class="cx-badge ${rar}">${rarHe(rar)}</div>
      </div>
      <div class="cx-ability${hasEffect?' has-effect':''}">${c.ability||'אין יכולת מיוחדת.'}</div>
    `;

    // power
    const pow=document.createElement('div');
    pow.className='cx-power-pill';
    pow.innerHTML=`${c.power}<span>PWR</span>`;

    row.appendChild(mini);
    row.appendChild(info);
    row.appendChild(pow);
    grid.appendChild(row);
  });
}


function rarHe(r){
  return r==='hitman'?'חיסול':r==='legendary'?'אגדי':r==='rare'?'נדיר':'רגיל';
}
function smokePlayerHand(){
  const wrap=document.getElementById('hand');
  const cards=wrap.querySelectorAll('.card');

  // 1. Shuffle animation on each card
  cards.forEach((el,i)=>{
    const r=parseFloat(el.style.transform.match(/rotate\(([^)]+)deg\)/)?.[1]||0);
    const y=parseFloat(el.style.transform.match(/translateY\(([^)]+)px\)/)?.[1]||0);
    el.style.setProperty('--hand-r', r+'deg');
    el.style.setProperty('--hand-y', y+'px');
    el.style.animationDelay=(i*50)+'ms';
    el.classList.add('shuffling');
    setTimeout(()=>{ el.classList.remove('shuffling'); el.style.animationDelay=''; }, 700+i*50);
  });

  // 2. After shuffle, put a big smoke overlay over the whole hand area
  setTimeout(()=>{
    const handArea=document.getElementById('hand-area');
    const overlay=document.createElement('div');
    overlay.id='smoke-overlay';
    overlay.style.cssText='position:absolute;inset:0;z-index:50;pointer-events:none;display:flex;align-items:center;justify-content:center;';

    handArea.style.position='relative';

    const wr=wrap.getBoundingClientRect();

// ── ANIMATED BACKGROUND ENGINE ──
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let bgAnim = null;
let bgFrame = 0;

function resizeBgCanvas(){
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBgCanvas();
window.addEventListener('resize', resizeBgCanvas);

function startBgAnimation(skinId){
  if(bgAnim) cancelAnimationFrame(bgAnim);
  bgFrame = 0;
  const draw = BG_ANIMATIONS[skinId] || BG_ANIMATIONS['classic'];
  function loop(){
    resizeBgCanvas();
    draw(bgCtx, bgCanvas.width, bgCanvas.height, bgFrame);
    bgFrame++;
    bgAnim = requestAnimationFrame(loop);
  }
  loop();
}

const BG_ANIMATIONS = {

  classic(ctx, W, H, f){
    // Green felt table with subtle shimmer
    ctx.fillStyle = '#163016';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(100,180,100,0.04)';
    ctx.lineWidth = 1;
    for(let i=0;i<W;i+=20){
      ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke();
    }
    for(let i=0;i<H;i+=20){
      ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke();
    }
    // shimmer spots
    const t = f*0.02;
    for(let i=0;i<5;i++){
      const x = W*(0.2+i*0.15+Math.sin(t+i)*0.05);
      const y = H*(0.3+Math.cos(t*0.7+i)*0.3);
      const g = ctx.createRadialGradient(x,y,0,x,y,80);
      g.addColorStop(0,'rgba(100,200,100,0.04)');
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    }
  },

  midnight(ctx, W, H, f){
    // Starry night sky
    ctx.fillStyle = '#050510';
    ctx.fillRect(0,0,W,H);
    // moon glow
    const mx=W*0.8, my=H*0.15;
    const mg = ctx.createRadialGradient(mx,my,0,mx,my,120);
    mg.addColorStop(0,'rgba(180,160,255,0.18)');
    mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
    // stars twinkling
    const stars=[];
    if(!bgCanvas._stars){
      bgCanvas._stars=Array.from({length:120},()=>({
        x:Math.random()*W, y:Math.random()*H,
        r:Math.random()*1.5+0.3, phase:Math.random()*Math.PI*2, speed:Math.random()*0.03+0.01
      }));
    }
    bgCanvas._stars.forEach(s=>{
      const brightness = 0.4+0.6*Math.abs(Math.sin(f*s.speed+s.phase));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,255,${brightness})`;
      ctx.fill();
    });
    // shooting star occasionally
    if(f%300<60){
      const p=(f%300)/60;
      ctx.strokeStyle=`rgba(200,200,255,${1-p})`;
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(W*0.3+p*W*0.4, H*0.1+p*H*0.2);
      ctx.lineTo(W*0.3+p*W*0.4-30, H*0.1+p*H*0.2-15);
      ctx.stroke();
    }
  },

  gold(ctx, W, H, f){
    // Bright throne room with dramatic golden rays
    ctx.fillStyle = '#1a1100';
    ctx.fillRect(0,0,W,H);
    // ambient warm glow
    const ag=ctx.createRadialGradient(W/2,H*0.3,0,W/2,H*0.3,W*0.7);
    ag.addColorStop(0,'rgba(180,120,0,0.25)');
    ag.addColorStop(1,'transparent');
    ctx.fillStyle=ag; ctx.fillRect(0,0,W,H);
    const t=f*0.015;
    // dramatic rays
    for(let i=0;i<12;i++){
      const angle = (i/12)*Math.PI*2 + t*0.25;
      const cx=W/2, cy=H*0.2;
      const brightness=0.18+0.12*Math.abs(Math.sin(t*0.8+i*0.6));
      const g=ctx.createLinearGradient(cx,cy,cx+Math.cos(angle)*W*1.5,cy+Math.sin(angle)*H*1.5);
      g.addColorStop(0,`rgba(255,200,50,${brightness})`);
      g.addColorStop(0.4,`rgba(220,160,20,${brightness*0.4})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(angle-0.12)*W*2.5,cy+Math.sin(angle-0.12)*H*2.5);
      ctx.lineTo(cx+Math.cos(angle+0.12)*W*2.5,cy+Math.sin(angle+0.12)*H*2.5);
      ctx.closePath();
      ctx.fill();
    }
    // golden dust particles
    if(!bgCanvas._goldDust){
      bgCanvas._goldDust=Array.from({length:50},()=>({
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-0.5)*0.4, vy:-Math.random()*0.5-0.2,
        size:Math.random()*2+0.5, phase:Math.random()*Math.PI*2
      }));
    }
    bgCanvas._goldDust.forEach(p=>{
      p.x=(p.x+p.vx+W)%W; p.y=(p.y+p.vy+H)%H;
      const a=0.4+0.4*Math.sin(f*0.06+p.phase);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,210,60,${a})`; ctx.fill();
    });
    // floor shimmer
    const fg=ctx.createLinearGradient(0,H*0.6,0,H);
    fg.addColorStop(0,'transparent');
    fg.addColorStop(1,'rgba(200,140,0,0.2)');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
  },

  neon(ctx, W, H, f){
    // Vivid cyberpunk neon city
    ctx.fillStyle='#000a06';
    ctx.fillRect(0,0,W,H);
    const t=f*0.5;

    // moving grid — perspective style, converging to horizon
    const gridSize=50;
    const offset=t%gridSize;
    // vertical lines
    for(let x=0;x<W+gridSize;x+=gridSize){
      const pulse=0.25+0.2*Math.sin(f*0.04+x*0.05);
      ctx.strokeStyle=`rgba(0,255,120,${pulse})`;
      ctx.lineWidth=1.2;
      ctx.shadowBlur=8; ctx.shadowColor='rgba(0,255,120,0.8)';
      ctx.beginPath(); ctx.moveTo(x-offset,0); ctx.lineTo(x-offset,H); ctx.stroke();
    }
    // horizontal lines
    for(let y=0;y<H+gridSize;y+=gridSize){
      const pulse=0.2+0.15*Math.sin(f*0.03+y*0.05);
      ctx.strokeStyle=`rgba(0,255,120,${pulse})`;
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,y-offset*0.6); ctx.lineTo(W,y-offset*0.6); ctx.stroke();
    }
    ctx.shadowBlur=0;

    // bright neon signs — random flicker rectangles
    if(!bgCanvas._signs){
      bgCanvas._signs=Array.from({length:8},()=>({
        x:Math.random()*W, y:Math.random()*H*0.7,
        w:30+Math.random()*60, h:8+Math.random()*16,
        color:[
          [0,255,120],[255,0,180],[0,180,255],[255,180,0]
        ][Math.floor(Math.random()*4)],
        phase:Math.random()*Math.PI*2,
        flickerRate:0.05+Math.random()*0.15
      }));
    }
    bgCanvas._signs.forEach(s=>{
      const on=Math.sin(f*s.flickerRate+s.phase)>-0.3;
      if(!on) return;
      const [r,g,b]=s.color;
      const a=0.6+0.4*Math.abs(Math.sin(f*s.flickerRate*2+s.phase));
      ctx.shadowBlur=20; ctx.shadowColor=`rgba(${r},${g},${b},0.9)`;
      ctx.fillStyle=`rgba(${r},${g},${b},${a})`;
      ctx.fillRect(s.x,s.y,s.w,s.h);
      ctx.shadowBlur=0;
    });

    // large pulsing neon orbs
    for(let i=0;i<4;i++){
      const px=W*(0.15+i*0.24);
      const py=H*(0.3+Math.sin(f*0.025+i*1.5)*0.25);
      const r=60+30*Math.sin(f*0.04+i);
      const colors=['rgba(0,255,120','rgba(255,0,200','rgba(0,200,255','rgba(200,255,0'][i];
      const g=ctx.createRadialGradient(px,py,0,px,py,r);
      g.addColorStop(0,`${colors},${0.2+0.15*Math.sin(f*0.05+i)})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    }

    // vignette
    const vig=ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.9);
    vig.addColorStop(0,'transparent');
    vig.addColorStop(1,'rgba(0,0,0,0.6)');
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  },

  blood(ctx, W, H, f){
    // Rainy night city skyline
    const t=f*0.016;

    // sky gradient — dark blue-purple night
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#05050f');
    sky.addColorStop(0.6,'#0a0818');
    sky.addColorStop(1,'#12101e');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // distant city glow on horizon
    const hGlow=ctx.createLinearGradient(0,H*0.45,0,H*0.62);
    hGlow.addColorStop(0,'transparent');
    hGlow.addColorStop(0.5,`rgba(255,140,60,${0.06+0.02*Math.sin(t*0.7)})`);
    hGlow.addColorStop(1,'transparent');
    ctx.fillStyle=hGlow; ctx.fillRect(0,0,W,H);

    // ── BUILDINGS ──
    if(!bgCanvas._city){
      const bldgs=[];
      let x=0;
      while(x<W){
        const w=18+Math.random()*55;
        const h=H*0.15+Math.random()*H*0.45;
        const col=Math.random()<0.15?'#1a1830':'#111120';
        // windows
        const wins=[];
        const wCols=Math.floor(w/10);
        const wRows=Math.floor(h/14);
        for(let r=0;r<wRows;r++){
          for(let c=0;c<wCols;c++){
            const lit=Math.random()<0.35;
            const warm=Math.random()<0.6;
            wins.push({r,c,lit,warm,flicker:Math.random()<0.08,phase:Math.random()*Math.PI*2});
          }
        }
        bldgs.push({x,w,h,col,wins,wCols,wRows});
        x+=w+1+Math.random()*4;
      }
      bgCanvas._city={bldgs};
    }

    const horizonY=H*0.55;
    bgCanvas._city.bldgs.forEach(b=>{
      const by=horizonY-b.h;
      // building body
      ctx.fillStyle=b.col;
      ctx.fillRect(b.x,by,b.w,b.h);
      // top edge slightly lighter
      ctx.fillStyle='rgba(255,255,255,0.04)';
      ctx.fillRect(b.x,by,b.w,1);
      // windows
      b.wins.forEach(w=>{
        if(!w.lit) return;
        const flickering=w.flicker&&(Math.sin(t*8+w.phase)>0.7);
        const wx=b.x+4+w.c*10;
        const wy=by+b.h-14-w.r*14;
        if(wy<by) return;
        const alpha=flickering?0.2:0.65+0.15*Math.sin(t*0.5+w.phase);
        if(w.warm){
          ctx.fillStyle=`rgba(255,${180+Math.floor(Math.sin(w.phase)*20)},80,${alpha})`;
        } else {
          ctx.fillStyle=`rgba(180,210,255,${alpha*0.8})`;
        }
        ctx.fillRect(wx,wy,6,8);
        // window glow
        const wg=ctx.createRadialGradient(wx+3,wy+4,0,wx+3,wy+4,12);
        wg.addColorStop(0,w.warm?`rgba(255,160,60,${alpha*0.3})`:`rgba(150,200,255,${alpha*0.2})`);
        wg.addColorStop(1,'transparent');
        ctx.fillStyle=wg; ctx.fillRect(wx-8,wy-8,22,22);
      });
    });

    // ground / road reflection
    const road=ctx.createLinearGradient(0,horizonY,0,H);
    road.addColorStop(0,'#0d0c18');
    road.addColorStop(1,'#080810');
    ctx.fillStyle=road; ctx.fillRect(0,horizonY,W,H);

    // reflection of city lights on wet road
    bgCanvas._city.bldgs.forEach(b=>{
      b.wins.forEach(w=>{
        if(!w.lit) return;
        const wx=b.x+4+w.c*10;
        const reflY=horizonY+(horizonY-(b.x)); // mirror point
        const ripple=Math.sin(t*2+wx*0.05)*2;
        const alpha=(0.08+0.05*Math.sin(t+w.phase));
        ctx.fillStyle=w.warm?`rgba(255,160,60,${alpha})`:`rgba(150,200,255,${alpha})`;
        ctx.fillRect(wx+ripple, horizonY+2, 4, 20+Math.random()*30);
      });
    });

    // ── RAIN ──
    if(!bgCanvas._rain){
      bgCanvas._rain=Array.from({length:200},()=>({
        x:Math.random()*W, y:Math.random()*H,
        speed:8+Math.random()*12, len:8+Math.random()*16,
        alpha:0.08+Math.random()*0.18
      }));
    }
    ctx.strokeStyle='rgba(180,200,255,1)';
    ctx.lineWidth=0.6;
    bgCanvas._rain.forEach(r=>{
      r.y+=r.speed; r.x+=r.speed*0.15;
      if(r.y>H){ r.y=-r.len; r.x=Math.random()*W; }
      ctx.globalAlpha=r.alpha;
      ctx.beginPath();
      ctx.moveTo(r.x,r.y);
      ctx.lineTo(r.x+r.len*0.15,r.y+r.len);
      ctx.stroke();
    });
    ctx.globalAlpha=1;

    // vignette
    const vig=ctx.createRadialGradient(W/2,H/2,H*0.15,W/2,H/2,H*0.9);
    vig.addColorStop(0,'transparent');
    vig.addColorStop(1,'rgba(0,0,0,0.65)');
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  },

  ocean(ctx, W, H, f){
    // Deep ocean with waves and bioluminescence
    ctx.fillStyle = '#000d1a';
    ctx.fillRect(0,0,W,H);
    const t=f*0.02;
    // deep glow
    const dg=ctx.createLinearGradient(0,H*0.4,0,H);
    dg.addColorStop(0,'transparent');
    dg.addColorStop(1,'rgba(0,40,100,0.3)');
    ctx.fillStyle=dg; ctx.fillRect(0,0,W,H);
    // wave layers
    for(let layer=0;layer<4;layer++){
      ctx.beginPath();
      const waveH=H*(0.3+layer*0.18);
      ctx.moveTo(0,waveH);
      for(let x=0;x<=W;x+=4){
        const y=waveH+Math.sin(x*0.012+t*(1+layer*0.3))*8*(4-layer)+Math.sin(x*0.025-t*0.7)*4;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      ctx.fillStyle=`rgba(0,${40+layer*20},${80+layer*20},${0.06+layer*0.02})`;
      ctx.fill();
    }
    // bioluminescent particles
    if(!bgCanvas._particles){
      bgCanvas._particles=Array.from({length:40},()=>({
        x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.3,
        vy:-Math.random()*0.2, phase:Math.random()*Math.PI*2
      }));
    }
    bgCanvas._particles.forEach(p=>{
      p.x=(p.x+p.vx+W)%W; p.y=(p.y+p.vy+H)%H;
      const a=0.3+0.4*Math.abs(Math.sin(f*0.04+p.phase));
      ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,200,255,${a})`; ctx.fill();
    });
  },

  purple(ctx, W, H, f){
    // Deep ice cave — cracks, frozen surface, cold light shafts
    const t=f*0.018;

    // base — deep icy blue
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#001828');
    bg.addColorStop(0.5,'#002035');
    bg.addColorStop(1,'#003050');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // ice crack lines
    if(!bgCanvas._cracks){
      bgCanvas._cracks=[];
      for(let i=0;i<18;i++){
        const sx=Math.random()*W, sy=Math.random()*H;
        const segs=[{x:sx,y:sy}];
        for(let s=0;s<6;s++){
          segs.push({
            x:segs[s].x+(Math.random()-0.5)*80,
            y:segs[s].y+(Math.random()-0.5)*60
          });
        }
        bgCanvas._cracks.push({segs, phase:Math.random()*Math.PI*2});
      }
    }
    bgCanvas._cracks.forEach(c=>{
      const glow=0.15+0.12*Math.abs(Math.sin(f*0.025+c.phase));
      ctx.strokeStyle=`rgba(120,220,255,${glow})`;
      ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.moveTo(c.segs[0].x, c.segs[0].y);
      c.segs.slice(1).forEach(s=>ctx.lineTo(s.x,s.y));
      ctx.stroke();
    });

    // frozen surface at bottom — reflective ice floor
    const floor=ctx.createLinearGradient(0,H*0.72,0,H);
    floor.addColorStop(0,'transparent');
    floor.addColorStop(0.3,`rgba(80,180,255,0.12)`);
    floor.addColorStop(1,`rgba(150,230,255,0.22)`);
    ctx.fillStyle=floor; ctx.fillRect(0,0,W,H);

    // ice tiles shimmer
    const tileSize=60;
    for(let x=0;x<W;x+=tileSize){
      for(let y=Math.floor(H*0.72);y<H;y+=tileSize/3){
        const shimmer=0.04+0.03*Math.sin(t*1.5+x*0.05+y*0.08);
        ctx.strokeStyle=`rgba(180,240,255,${shimmer})`;
        ctx.lineWidth=0.5;
        ctx.strokeRect(x,y,tileSize,tileSize/3);
      }
    }

    // cold light shafts from above
    for(let i=0;i<4;i++){
      const sx=W*(0.15+i*0.24+Math.sin(t*0.3+i)*0.04);
      const width=30+15*Math.sin(t*0.5+i);
      const alpha=0.05+0.04*Math.sin(t*0.8+i*1.4);
      const lg=ctx.createLinearGradient(sx,0,sx,H*0.7);
      lg.addColorStop(0,`rgba(150,230,255,${alpha*2})`);
      lg.addColorStop(1,'transparent');
      ctx.fillStyle=lg;
      ctx.beginPath();
      ctx.moveTo(sx-width/2,0);
      ctx.lineTo(sx+width/2,0);
      ctx.lineTo(sx+width*1.5,H*0.7);
      ctx.lineTo(sx-width*1.5,H*0.7);
      ctx.closePath();
      ctx.fill();
    }

    // floating ice crystals
    if(!bgCanvas._crystals){
      bgCanvas._crystals=Array.from({length:35},()=>({
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-0.5)*0.15, vy:(Math.random()-0.5)*0.15,
        size:2+Math.random()*4, phase:Math.random()*Math.PI*2, rot:Math.random()*Math.PI
      }));
    }
    bgCanvas._crystals.forEach(c=>{
      c.x=(c.x+c.vx+W)%W; c.y=(c.y+c.vy+H)%H;
      c.rot+=0.005;
      const a=0.3+0.4*Math.abs(Math.sin(f*0.03+c.phase));
      ctx.save();
      ctx.translate(c.x,c.y);
      ctx.rotate(c.rot);
      ctx.strokeStyle=`rgba(180,240,255,${a})`;
      ctx.lineWidth=1;
      for(let arm=0;arm<6;arm++){
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(0,c.size);
        ctx.stroke();
        ctx.rotate(Math.PI/3);
      }
      ctx.restore();
    });

    // snowflakes
    if(!bgCanvas._snow){
      bgCanvas._snow=Array.from({length:60},()=>({
        x:Math.random()*W, y:Math.random()*H,
        vy:0.2+Math.random()*0.6, vx:Math.sin(Math.random()*Math.PI*2)*0.3,
        size:1+Math.random()*2, phase:Math.random()*Math.PI*2
      }));
    }
    bgCanvas._snow.forEach(s=>{
      s.x=(s.x+s.vx+W)%W; s.y=(s.y+s.vy)%H;
      const a=0.5+0.3*Math.sin(f*0.04+s.phase);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,245,255,${a})`; ctx.fill();
    });
  },

  desert(ctx, W, H, f){
    // Raging fire with flames and embers
    ctx.fillStyle = '#0d0200';
    ctx.fillRect(0,0,W,H);
    const t=f*0.03;
    // flame layers from bottom
    for(let layer=0;layer<6;layer++){
      ctx.beginPath();
      const baseY=H*(1.05-layer*0.12);
      ctx.moveTo(0,H);
      for(let x=0;x<=W;x+=3){
        const flicker=Math.sin(x*0.03+t*(1.5+layer*0.4))*18+Math.sin(x*0.07-t*(2+layer*0.3))*8;
        const y=baseY+flicker;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      const r=255, g=Math.floor(80-layer*10), b=0;
      const alpha=0.18-layer*0.02;
      ctx.fillStyle=`rgba(${r},${Math.max(0,g)},${b},${alpha})`;
      ctx.fill();
    }
    // fire glow
    const fg=ctx.createLinearGradient(0,H*0.3,0,H);
    fg.addColorStop(0,'transparent');
    fg.addColorStop(0.5,`rgba(255,80,0,${0.08+0.04*Math.sin(t)})`);
    fg.addColorStop(1,`rgba(255,40,0,0.25)`);
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
    // embers floating up
    if(!bgCanvas._embers){
      bgCanvas._embers=Array.from({length:60},()=>({
        x:Math.random()*W, y:H+Math.random()*100,
        vx:(Math.random()-0.5)*1.2, vy:-(0.8+Math.random()*2),
        size:1+Math.random()*2.5, life:Math.random(), decay:0.003+Math.random()*0.006
      }));
    }
    bgCanvas._embers.forEach(e=>{
      e.x+=e.vx; e.y+=e.vy; e.life-=e.decay;
      if(e.life<=0||e.y<-10){ e.x=Math.random()*W; e.y=H+10; e.life=0.8+Math.random()*0.2; }
      const a=e.life*0.9;
      const r=255, g=Math.floor(e.life*180);
      ctx.beginPath(); ctx.arc(e.x,e.y,e.size*e.life,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},0,${a})`; ctx.fill();
    });
  },
};

function showExposeOverlay(pos, total){
  const overlay=document.getElementById('expose-overlay');
  const visual=document.getElementById('expose-deck-visual');
  const label=document.getElementById('expose-label');
  visual.innerHTML='';

  // Show cards as a row — highlight hitman position dramatically
  const show=Math.min(total,10);
  for(let i=1;i<=show;i++){
    const slot=document.createElement('div');
    if(i===pos){
      slot.className='expose-card-slot hitman-pos';
      slot.textContent='🕴️';
    } else {
      slot.className='expose-card-slot';
      slot.textContent=i;
      // fade cards far from hitman
      const dist=Math.abs(i-pos);
      slot.style.opacity=Math.max(0.2,1-dist*0.15)+'';
    }
    visual.appendChild(slot);
  }
  if(total>show){
    const more=document.createElement('div');
    more.style.cssText='color:rgba(255,255,255,.3);font-size:16px;align-self:center;padding:0 8px;';
    more.textContent='···';
    visual.appendChild(more);
  }

  label.innerHTML='קלף מספר <span style="font-size:48px;color:#FF0000;text-shadow:0 0 30px red">'+pos+'</span> מלמעלה!';
  console.log('showExpose called, overlay:', overlay, 'pos:', pos); overlay.classList.add('show'); console.log('overlay display after:', overlay.style.display, 'classList:', overlay.className);
}
function hideExposeOverlay(){
  document.getElementById('expose-overlay').classList.remove('show');
}


// ── AUDIO SYSTEM ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.connect(AC.destination);
masterGain.gain.value = 0.7; // default volume
let isMuted = false;







// Override toggleMute to also update panel

function toggleMute(){
  if(isMuted){
    const saved = parseFloat(localStorage.getItem('hitman_vol_pre')||'0.7');
    setVolume(saved > 0 ? saved : 0.7);
  } else {
    localStorage.setItem('hitman_vol_pre', masterGain.gain.value);
    setVolume(0);
  }
}

function updateVolumeBtn(){
  const v = masterGain.gain.value;
  const btn = document.getElementById('volume-btn');
  if(btn) btn.textContent = isMuted ? '🔇' : v > 0.5 ? '🔊' : '🔉';
}

  p.innerHTML = `
    <div style="width:100%;max-width:480px;background:#0d0b14;border-radius:20px 20px 0 0;border-top:2px solid rgba(255,255,255,.1);padding:24px 20px 40px;direction:rtl;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#fff;margin-bottom:20px;">🔊 הגדרות שמע</div>
      <div style="margin-bottom:20px;">
        <div style="font-family:'Heebo',sans-serif;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:10px;">עוצמת קול</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">🔇</span>

// ── SOUND EFFECTS ──
function playTone(freq, type='sine', dur=0.15, vol=0.3, delay=0){
  resumeAC();
  const o=AC.createOscillator();
  const g=AC.createGain();
  o.connect(g); g.connect(masterGain);
  o.type=type; o.frequency.setValueAtTime(freq, AC.currentTime+delay);
  g.gain.setValueAtTime(0, AC.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol, AC.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);
  o.stop(AC.currentTime+delay+dur+0.01);
}

function playNoise(dur=0.1, vol=0.15, freq=800){
  resumeAC();
  const buf=AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=AC.createBufferSource();
  const flt=AC.createBiquadFilter();
  const g=AC.createGain();
  src.buffer=buf; flt.type='bandpass'; flt.frequency.value=freq;
  src.connect(flt); flt.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  src.start(); src.stop(AC.currentTime+dur);
}

// Card draw — realistic card slide/snap sound
function sfxDraw(){
  resumeAC();
  // Initial slide (high freq noise, short)
  const slide=AC.createBuffer(1, AC.sampleRate*0.06, AC.sampleRate);
  const sd=slide.getChannelData(0);
  for(let i=0;i<sd.length;i++) sd[i]=(Math.random()*2-1)*Math.pow(1-i/sd.length,1.5);
  const slideSrc=AC.createBufferSource();
  const slideFilter=AC.createBiquadFilter();
  const slideGain=AC.createGain();
  slideSrc.buffer=slide;
  slideFilter.type='bandpass'; slideFilter.frequency.value=4000; slideFilter.Q.value=0.8;
  slideSrc.connect(slideFilter); slideFilter.connect(slideGain); slideGain.connect(masterGain);
  slideGain.gain.setValueAtTime(0.4, AC.currentTime);
  slideGain.gain.linearRampToValueAtTime(0, AC.currentTime+0.06);
  slideSrc.start(); slideSrc.stop(AC.currentTime+0.07);

  // Snap/thwack at the end (low thump)
  const snap=AC.createBuffer(1, AC.sampleRate*0.05, AC.sampleRate);
  const snapd=snap.getChannelData(0);
  for(let i=0;i<snapd.length;i++) snapd[i]=(Math.random()*2-1)*Math.pow(1-i/snapd.length,2);
  const snapSrc=AC.createBufferSource();
  const snapFilter=AC.createBiquadFilter();
  const snapGain=AC.createGain();
  snapSrc.buffer=snap;
  snapFilter.type='lowpass'; snapFilter.frequency.value=800;
  snapSrc.connect(snapFilter); snapFilter.connect(snapGain); snapGain.connect(masterGain);
  snapGain.gain.setValueAtTime(0.35, AC.currentTime+0.04);
  snapGain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.09);
  snapSrc.start(AC.currentTime+0.04); snapSrc.stop(AC.currentTime+0.1);
}

// Ability sounds per effect
function playMelody(notes, vol=0.18){
  // notes: [{f,d,t}] f=freq, d=duration, t=type
  resumeAC();
  notes.forEach(({f,d,type='sine',delay=0,v})=>{
    if(!f) return;
    const o=AC.createOscillator();
    const g=AC.createGain();
    o.connect(g); g.connect(masterGain);
    o.type=type; o.frequency.value=f;
    const gt=AC.currentTime+delay;
    g.gain.setValueAtTime(0,gt);
    g.gain.linearRampToValueAtTime(v||vol,gt+0.02);
    g.gain.setValueAtTime(v||vol,gt+d*0.75);
    g.gain.linearRampToValueAtTime(0,gt+d);
    o.start(gt); o.stop(gt+d+0.02);
  });
}
